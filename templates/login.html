<!DOCTYPE html>
<html>
<head>
    <title>Hotel Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; margin-top: 100px; background-color: #FAF8F4; }
        .login-box { background: white; border: 1px solid #ddd; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #38424A; }
        input { display: block; margin: 15px 0; padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #8FB8D8; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #7AA9CC; }
        .error { color: #d9534f; font-size: 0.9em; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="error">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
